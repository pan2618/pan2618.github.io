<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密碼強度檢測</title>
    <style>
        /* Fullscreen overlay for loading */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(34, 34, 34, 0.95); /* 半透明深色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* 確保在最上層 */
        }

        .loading {
            text-align: center;
        }

        .loading h2 {
            color: #ccc;
            margin: 0;
            font: 0.8em verdana;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .loading span {
            display: inline-block;
            vertical-align: middle;
            width: 0.6em;
            height: 0.6em;
            margin: 0.19em;
            background: #007DB6;
            border-radius: 0.6em;
            animation: loading 1s infinite alternate;
        }

        .loading span:nth-of-type(2) {
            background: #008FB2;
            animation-delay: 0.2s;
        }

        .loading span:nth-of-type(3) {
            background: #009B9E;
            animation-delay: 0.4s;
        }

        .loading span:nth-of-type(4) {
            background: #00A77D;
            animation-delay: 0.6s;
        }

        .loading span:nth-of-type(5) {
            background: #00B247;
            animation-delay: 0.8s;
        }

        .loading span:nth-of-type(6) {
            background: #5AB027;
            animation-delay: 1.0s;
        }

        .loading span:nth-of-type(7) {
            background: #A0B61E;
            animation-delay: 1.2s;
        }

        @keyframes loading {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input {
            width: 300px;
            padding: 10px;
            font-size: 16px;
        }
        .message {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            color: green;
        }
        
    </style>

</head>
<body>

    <!-- Loading 畫面 -->
    <div id="loading-overlay">
        <div class="loading">
            <h2>LOADING...</h2>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <h2>我的密碼安全嗎？</h2>
    <p>請輸入密碼檢測強度：</p>
    <input type="text" id="passwordInput" placeholder="輸入密碼">
    <div class="message" id="message"></div>

        <!-- 引入 Bootstrap 和 JavaScript 依賴 -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        $(document).ready(function() {
            // 顯示 loading 畫面
            setTimeout(function() {
                $('#loading-overlay').fadeOut(300);
            }, 1500);

            // 語言切換功能
            $('#language-switcher').click(function() {
                $('#loading-overlay').fadeIn(300); // 顯示等待動畫

                setTimeout(() => {
                    var currentLanguage = localStorage.getItem('language') || 'zh';
                    if (currentLanguage === 'zh') {
                        localStorage.setItem('language', 'jp');
                        $('#language-switcher').text('日本語 / 中文');
                        $('#main-title').text('私の作品');
                        $('#main-description').text('このページでは私が作成した作品を主に紹介します。');
                        $('nav a[href="about-site.html"]').text('私の作品');
                        $('nav a[href="about-us.html"]').text('シャトルコックについて');
                    } else {
                        localStorage.setItem('language', 'zh');
                        $('#language-switcher').text('中文 / 日本語');
                        $('#main-title').text('我的作品');
                        $('#main-description').text('This page primarily showcases the artwork I have created.');
                        $('nav a[href="about-site.html"]').text('我的作品');
                        $('nav a[href="about-us.html"]').text('關於羽球');
                    }

                    $('#navbarNav').collapse('hide'); // 點擊語言切換後收起導航欄
                    $('#loading-overlay').fadeOut(300);
                }, 1500);
            });

            $('#navbarNav').on('show.bs.collapse', function () {
                $('#scrollBtn').hide();
            });

            $('#navbarNav').on('hidden.bs.collapse', function () {
                $('#scrollBtn').show();
            });

        var savedLanguage = localStorage.getItem('language') || 'zh';
        if (savedLanguage === 'jp') {
            $('#language-switcher').text('日本語 / 中文');
                        $('#main-title').text('私の作品');
                        $('#main-description').text('このページでは私が作成した作品を主に紹介します。');
                        $('nav a[href="about-site.html"]').text('私の作品');
                        $('nav a[href="about-us.html"]').text('シャトルコックについて');
            }
        });
        document.getElementById("passwordInput").addEventListener("input", function() {
            let inputText = this.value;
            let message = document.getElementById("message");

            // 定義特定關鍵字對應的回覆
            let responses = {
                "愛爽": "強到靠北",
                "海希": "強到靠北",
                "祥": "這個密碼太常見了，請更換"
            };

            if (responses[inputText]) {
                message.textContent = "強度評估：" + responses[inputText];
                message.style.color = "green";
            } else {
                message.textContent = "";
            }
        });
    </script>

</body>
</html>
