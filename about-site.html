<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品</title>
    <link rel="stylesheet" href="styles.css">
    <!-- 引入 Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入 Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        /* 等待動畫的 CSS */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f3f3f3;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: hidden;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
    </div>

    <!-- 頁首區域 -->
    <header class="hero-section my-page-header" style="background-image: url('images/image.png');">
        <!-- 導航欄 -->
        <nav class="navbar navbar-expand-lg navbar-light">
            <div class="container-fluid">
                <a class="navbar-brand text-white" href="index.html">Home</a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="about-site.html">我的作品</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="about-us.html">關於羽球</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#" id="language-switcher">中文 / 日本語</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="hero-content text-center text-white">
            <h2 id="main-title">我的作品</h2>
            <h5 id="main-description">This page primarily showcases the artwork I have created.</h5>
            <p></p>
            <!-- 往下滑按鈕 -->
            <a href="#next-section" class="btn btn-outline-light" id="scrollBtn">ᐁ</a>
        </div>
    </header>

    <div class="transition-blur"></div>

    <!-- 主內容區域 -->
    <main>
        <section id="next-section" class="next-section" style="background-image: url('images/test.png');">
            <div class="container">
                <div class="row">
                    <!-- 圖片1 -->
                    <div class="col-6 col-md-4 mb-4">
                        <div class="card shadow-sm">
                            <img src="images/work1.jpg" class="card-img-top" alt="作品1">
                            <div class="card-body">
                                <h5 class="text-black-50">《崩壞：星穹鐵道》- ホタル</h5>
                            </div>
                        </div>
                    </div>
                    <!-- 圖片2 -->
                    <div class="col-6 col-md-4 mb-4">
                        <div class="card shadow-sm">
                            <img src="images/work2.jpg" class="card-img-top" alt="作品2">
                            <div class="card-body">
                                <h5 class="text-black-50">《崩壞：星穹鐵道》- ホタル</h5>
                            </div>
                        </div>
                    </div>
                    <!-- 其他作品區塊 -->
                    <div class="col-6 col-md-4 mb-4">
                        <div class="card shadow-sm">
                            <img src="images/申鶴e.png" class="card-img-top" alt="作品2">
                            <div class="card-body">
                                <h5 class="text-black-50">《原神》- 申鶴</h5>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-4 mb-4">
                        <div class="card shadow-sm">
                            <img src="images/screenshot2.png" class="card-img-top" alt="作品2">
                            <div class="card-body">
                                <h5 class="text-black-50">《蔚藍檔案》- 小鳥遊 ホシノ</h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="transition-blur"></div>

    <!-- 頁尾區域 -->
    <footer class="footer bg-dark text-white text-center py-3" style="width: 100%; margin: 0;">
        <div class="container">
            <h6 id="footer-copyright">&copy; 2024 Shuttlecock website</h6>
            <h6 id="footer-email" class="text-info">shuttlecock0826@gmail.com</h6>
            <div class="row">
                <div class="col-6 col-md-3">
                    <a href="mailto:chenxiyu247@gmail.com" class="text-white footer-link" id="footer-business">商業合作</a>
                </div>
                <div class="col-6 col-md-3">
                    <a href="mailto:chenxiyu247@gmail.com" class="text-white footer-link" id="footer-contact">與我聯絡</a>
                </div>
                <div class="col-6 col-md-3">
                    <a href="https://kevin0826.fanbox.cc/plans" class="text-white footer-link" id="footer-support">贊助開發者</a>
                </div>
                <div class="col-6 col-md-3">
                    <a href="https://shopee.com/your-shop-link" class="text-white footer-link" id="footer-shop">線上商店</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- 引入 Bootstrap 和 JavaScript 依賴 -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <!-- 控制按鈕顯示/隱藏的 JavaScript -->
    <script>
        $(document).ready(function() {
            $('#navbarNav').on('show.bs.collapse', function () {
                $('#scrollBtn').hide();
            });

            $('#navbarNav').on('hidden.bs.collapse', function () {
                $('#scrollBtn').show();
            });

            // 語言切換按鈕
            $('#language-switcher').click(function() {
                $('#loading').css('visibility', 'visible'); // 顯示等待動畫

                setTimeout(() => {
                    var currentLanguage = localStorage.getItem('language') || 'zh';
                    if (currentLanguage === 'zh') {
                        // 切換到日語
                        localStorage.setItem('language', 'jp');
                        $('#language-switcher').text('中文 / 日本語');
                        $('#main-title').text('私の作品');
                        $('#main-description').text('このページでは私が作成した作品を主に紹介します。');
                        $('nav a[href="about-site.html"]').text('私の作品');
                        $('nav a[href="about-us.html"]').text('シャトルコックについて');
                        $('#footer-business').text('商業協力');
                        $('#footer-contact').text('お問い合わせ');
                        $('#footer-support').text('開発者を支援する');
                        $('#footer-shop').text('オンラインショップ');
                    } else {
                        // 切換到中文
                        localStorage.setItem('language', 'zh');
                        $('#language-switcher').text('中文 / 日本語');
                        $('#main-title').text('我的作品');
                        $('#main-description').text('This page primarily showcases the artwork I have created.');
                        $('nav a[href="about-site.html"]').text('我的作品');
                        $('nav a[href="about-us.html"]').text('關於羽球');
                        $('#footer-business').text('商業合作');
                        $('#footer-contact').text('與我聯絡');
                        $('#footer-support').text('贊助開發者');
                        $('#footer-shop').text('線上商店');
                    }

                    $('#navbarNav').collapse('hide'); // 點擊語言切換後收起導航欄
                    $('#loading').css('visibility', 'hidden'); // 隱藏等待動畫
                }, 1500); // 模擬1.5秒的加載時間
            });

            // 初始化頁面時根據本地語言狀態進行設置
            var savedLanguage = localStorage.getItem('language') || 'zh';
            if (savedLanguage === 'jp') {
                $('#language-switcher').click(); // 自動切換到日語
            }
        });
    </script>
</body>
</html>
