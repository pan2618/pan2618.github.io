<style>
/* ---------- 1.  基本變數 ---------- */
:root{
    --primary:#ffa556;
    --dark:#222;
    --grey:#555;
    --card:#f8f9fa;
}

/* ---------- 2.  全域 ---------- */
*{box-sizing:border-box}
body{
    margin:0;
    font-family:"Segoe UI",Arial,sans-serif;
    background:#fff;
    color:#333;
}
body.with-bg{
    background:#fff url("") center/cover no-repeat fixed;
}
body.with-bg::before{
    content:"";
    position:fixed;inset:0;
    background:inherit;      /* 套用 body 背景 */
    z-index:-1;
}

/* ---------- 3.  導覽列 ---------- */
.navbar{
    background:var(--dark);
}
.navbar-brand,
.navbar .nav-link{color:#fff!important;font-weight:600}
.navbar .nav-link:not(.disabled):hover{color:var(--primary)!important}
.navbar-toggler-icon{
    background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%23ffffff' stroke-width='2' stroke-linecap='round' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e")
}

body{padding-top:56px}      /* 固定導覽列高度 */

/* ---------- 4.  區塊間距 ---------- */
section{padding:2.5rem 0}
.card{border:none;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,.05)}

/* ---------- 5.  About ---------- */
#about-card h1{color:var(--primary);font-size:2rem;font-weight:800}

/* ---------- 6.  Skills ---------- */
#skills-title{font-weight:800}
.skills-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
}
@media (min-width: 768px) {
    .skills-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
}
.skill-item{
    background:var(--card);
    border-radius:12px;
    padding:1.5rem .5rem;
    text-align:center;
    transition:.3s;
}
.skill-item:hover{transform:translateY(-4px);box-shadow:0 6px 14px rgba(0,0,0,.1)}
.skill-icon{color:var(--primary);font-size:2rem;margin-bottom:.5rem}
.skill-label{color:var(--grey);margin-top:.5rem;font-weight:500}
.skill-circle{width:110px;height:110px;margin:0 auto;position:relative}
.skill-circle .progressbar-text{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:1.3rem;color:#000;
}

/* ---------- 7.  Footer ---------- */
footer{
    background:var(--dark);
    color:#ccc;
    text-align:center;
    padding:2rem 0; /* about.html uses 2rem */
    font-size:.9rem
}
footer a{color:var(--primary);margin:0 .3rem;text-decoration:none}
footer a:hover{text-decoration:underline}

.card,
.skill-item{
  background:rgba(250, 246, 246, 0.55);  /* 55% 透明白 */
  backdrop-filter:blur(15px);      /* 毛玻璃 */
  -webkit-backdrop-filter:blur(35px); /* Safari */
  border:1px solid rgba(255,255,255,.35);
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

#loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(34, 34, 34, 0.95);
    display: flex; 
    justify-content: center;
    align-items: center;
    z-index: 9999;
    visibility: hidden; /* Initially hidden; JS controls visibility */
}
.loading { text-align: center; }
.loading h2 { color: #ccc; margin: 0; font: 0.8em verdana; text-transform: uppercase; letter-spacing: 0.1em; }
.loading span { display: inline-block; vertical-align: middle; width: 0.6em; height: 0.6em; margin: 0.19em; background: #007DB6; border-radius: 0.6em; animation: loading-anim 1s infinite alternate; } /* Renamed animation to avoid conflict if any */
.loading span:nth-of-type(2) { background: #008FB2; animation-delay: 0.2s; }
.loading span:nth-of-type(3) { background: #009B9E; animation-delay: 0.4s; }
.loading span:nth-of-type(4) { background: #00A77D; animation-delay: 0.6s; }
.loading span:nth-of-type(5) { background: #00B247; animation-delay: 0.8s; }
.loading span:nth-of-type(6) { background: #5AB027; animation-delay: 1.0s; }
.loading span:nth-of-type(7) { background: #A0B61E; animation-delay: 1.2s; }
@keyframes loading-anim { 0% { opacity: 0; } 100% { opacity: 1; } }

.fade-in {
    opacity: 0;
}
.fade-in-triggered {
    opacity: 1 !important; 
    transform: translateY(0) !important;
    transition: opacity 0.9s ease-out, transform 0.9s ease-out;
}

.navbar .nav-link.disabled {
    color: rgba(255, 255, 255, 0.45) !important;
}

#fanbox-promo-card #fanbox_promo_title {
  color: var(--primary);
  font-weight: 700;
}
#fanbox-promo-card #fanbox_promo_button {
  background-color: #fff;
  color: var(--primary);
  border: 1px solid var(--primary);
  font-weight: 500;
  transition: color 0.15s ease-in-out, background-color 0.15s ease-in-out, border-color 0.15s ease-in-out;
}
#fanbox-promo-card #fanbox_promo_button:hover,
#fanbox-promo-card #fanbox_promo_button:focus {
  background-color: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/progressbar.js@1.0.1/dist/progressbar.min.js"></script>

<script>
$(document).ready(function() {

    // ---------- A. 語言處理 ----------
    
    // 【核心修改】頁面載入時，優先從 localStorage 讀取由首頁設定的語言
    var currentLanguage = localStorage.getItem('language') || 'zh';
    applyLanguage(currentLanguage);

    // 語言切換按鈕的點擊事件
    $('.language-option').on('click', function (e) {
        e.preventDefault();
        var newLang = $(this).data('lang');
        
        // 【核心修改】將新的語言選擇存入同一個 localStorage 'language' 中
        localStorage.setItem('language', newLang); 
        
        // 為了讓效果立即呈現，我們直接呼叫翻譯函式，而不是刷新頁面
        applyLanguage(newLang);
        
        $('#nav.show').collapse('hide');
    });

    // ---------- B. 頁面功能 (淡入、進度環等) ----------

    function scanFade(){
        $('.fade-in:not(.fade-in-triggered)').each(function(){
            const $el=$(this), top=$el.offset().top, view=$(window).scrollTop()+$(window).height();
            if(top < view - 50){ 
                $el.addClass('fade-in-triggered');
            }
        });
    }
    
    if($('body').hasClass('with-bg')){
        const url=$('body').data('bg');
        if(url) $('body').css('background-image','url('+url+')');
    }

    let skillStarted=false;
    const skillsStatsSectionEl = document.getElementById('my-skills-stats');
    if (skillsStatsSectionEl) {
        const progressBarIo = new IntersectionObserver(entries=>{
            entries.forEach(en=>{
                if(en.isIntersecting && !skillStarted){
                    $('.skill-circle').each(function(){
                        const frac=parseFloat(this.dataset.frac), text=this.dataset.text;
                        const bar=new ProgressBar.Circle(this,{
                            strokeWidth:6, color:'var(--primary)', trailColor:'#e5e5e5',
                            duration:1800, easing:'easeInOut',
                            text:{value:'0',className:'progressbar-text'}
                        });
                        bar.animate(frac,()=>{bar.setText(text);});
                    });
                    skillStarted=true;
                    progressBarIo.disconnect();
                }
            });
        },{threshold:0.4});
        progressBarIo.observe(skillsStatsSectionEl);
    }
    
    // 初始載入時觸發一次淡入掃描
    $(window).on('scroll load resize', scanFade);


    // ---------- C. 翻譯字典與應用函式 ----------
    function applyLanguage(lang) {
        $('html').attr('lang', lang === 'zh' ? 'zh-Hant' : lang);

        let t = {
            zh: {
                "about_nav_brand": "Home",
                "about_nav_novels": "小說集",
                "about_nav_about_me": "關於我",
                "about_main_title": "關於我",
                "about_main_p1": "羽球です，一位幻想靠覬覦遺產維生的插畫家",
                "about_main_p2": "我的作品涵蓋小說、二創與多媒體專案，大學學理科，沒怎麼練素描，直到畫圖的時候也只練過幾次，個人感到十分後悔。",
                "about_skill_novels": "小說作品",
                "about_skill_digital": "數位專案",
                "about_skill_illustrations": "插畫創作",
                "about_skill_community": "社群追蹤",
                "fanbox_promo_title": "第一次角色投票已開放",
                "fanbox_promo_subtitle": "請創作者喝杯咖啡吧(｡・ω・｡)",
                "fanbox_promo_button": "查看詳情",
                "about_footer_copyright": "© 2025 Shuttlecock 網站",
                "about_footer_collab": "其他合作",
                "about_footer_contact": "與我聯絡",
                "about_footer_platforms": "其他平台",
                "about_footer_shop": "線上商店",
            },
            jp: {
                "about_nav_brand": "ホーム",
                "about_nav_novels": "小説集",
                "about_nav_about_me": "私について",
                "about_main_title": "私について",
                "about_main_p1": "どうも、羽球（ユーチウ）です。「遺産をあてにして生きる」という壮大な夢を抱く、しがないイラストレーターです。",
                "about_main_p2": "小説の挿絵やファンアート、メディア作品など、ジャンルを問わず色々と描いています。実は大学の専攻は理系でして、デッサンの練習は数えるほどしか経験がありません。今更ながら、あの時もっと描いておけば…と激しく後悔する毎日です。",
                "about_skill_novels": "小説作品",
                "about_skill_digital": "デジタルプロジェクト",
                "about_skill_illustrations": "イラスト制作",
                "about_skill_community": "コミュニティ・フォロワー",
                "fanbox_promo_title": "第一回キャラクター投票開催中",
                "fanbox_promo_subtitle": "クリエイターにコーヒーを一杯どうぞ(｡・ω・｡)",
                "fanbox_promo_button": "詳細を見る",
                "about_footer_copyright": "© 2025 Shuttlecock ウェブサイト",
                "about_footer_collab": "その他の協力",
                "about_footer_contact": "お問い合わせ",
                "about_footer_platforms": "他のプラットフォーム",
                "about_footer_shop": "オンラインショップ",
            },
            en: {
                "about_nav_brand": "Home",
                "about_nav_novels": "Novels",
                "about_nav_about_me": "About Me",
                "about_main_title": "About Me",
                "about_main_p1": "Greetings, I'm Shuttlecock. I'm an illustrator, currently surviving on my creative work while fantasizing about the day I can live off a handsome inheritance.",
                "about_main_p2": "My portfolio is a mixed bag of novel illustrations, fan-created works, and various multimedia projects. I actually majored in the sciences and never really got the hang of sketching back in university. I've only picked it up a handful of times since, which, in hindsight, I regret immensely.",
                "about_skill_novels": "Novel Works",
                "about_skill_digital": "Digital Projects",
                "about_skill_illustrations": "Illustrations",
                "about_skill_community": "Community Following",
                "fanbox_promo_title": "First Character Poll Now Open",
                "fanbox_promo_subtitle": "Treat the creator to a coffee (｡・ω・｡)",
                "fanbox_promo_button": "View Details",
                "about_footer_copyright": "© 2025 Shuttlecock website",
                "about_footer_collab": "Other Collaborations",
                "about_footer_contact": "Contact Me",
                "about_footer_platforms": "Other Platforms",
                "about_footer_shop": "Online Store",
            }
        };

        let currentTranslations = t[lang] || t['zh']; 
        for (const id in currentTranslations) {
            $('#' + id).text(currentTranslations[id]);
        }
    }
});
</script>
