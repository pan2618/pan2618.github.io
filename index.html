  <style>
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(34, 34, 34, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      visibility: visible; /* Initially visible for loading */
    }

    .loading {
      text-align: center;
    }

    .loading h2 {
      color: #ccc;
      margin: 0;
      font: 0.8em verdana;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .loading span {
      display: inline-block;
      vertical-align: middle;
      width: 0.6em;
      height: 0.6em;
      margin: 0.19em;
      background: #007DB6;
      border-radius: 0.6em;
      animation: loading 1s infinite alternate;
    }

    .loading span:nth-of-type(2) {
      background: #008FB2;
      animation-delay: 0.2s;
    }

    .loading span:nth-of-type(3) {
      background: #009B9E;
      animation-delay: 0.4s;
    }

    .loading span:nth-of-type(4) {
      background: #00A77D;
      animation-delay: 0.6s;
    }

    .loading span:nth-of-type(5) {
      background: #00B247;
      animation-delay: 0.8s;
    }

    .loading span:nth-of-type(6) {
      background: #5AB027;
      animation-delay: 1.0s;
    }

    .loading span:nth-of-type(7) {
      background: #A0B61E;
      animation-delay: 1.2s;
    }

    @keyframes loading {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }


    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.9s ease-out, transform 0.9s ease-out;
    }

    .fade-in-triggered {
      opacity: 1 !important;
      transform: translateY(0) !important;
    }

    /* Custom style for Pixiv icon if needed */
    .pixiv-icon {
        width: 2em; /* Adjust size as needed */
        height: 2em; /* Adjust size as needed */
        vertical-align: middle; /* Align with Font Awesome icons */

  <script>
    $(document).ready(function () {
      // 檢查是否為重新整理（刷新）—若是，清除儲存的語言設定
      if (performance.navigation.type === performance.navigation.TYPE_RELOAD) {
        // Keep localStorage language setting on reload, user explicitly set it.
        // localStorage.removeItem('language'); 
      }

      var currentLanguage = localStorage.getItem('language') || 'zh';
      applyLanguage(currentLanguage);

      setTimeout(function () {
        $('#loading-overlay').fadeOut(300);
      }, 1000); // Reduced loading time for quicker access

      $('#navbarNav').on('show.bs.collapse', function () {
        $('#social-icons').hide();
      });
      $('#navbarNav').on('hidden.bs.collapse', function () {
        $('#social-icons').show();
      });

      function triggerFadeIn() {
        $('.fade-in').each(function () {
          var elementTop = $(this).offset().top;
          var viewportBottom = $(window).scrollTop() + $(window).height();
          if (elementTop < viewportBottom - 50) {
            $(this).addClass('fade-in-triggered');
          }
        });
      }
      
      $(window).on('scroll', triggerFadeIn);
      triggerFadeIn(); // Initial check

      $('.language-option').click(function (e) {
        e.preventDefault();
        var lang = $(this).data('lang');

        $('#loading-overlay').css('visibility', 'visible').fadeIn(100); // Quicker fade in

        setTimeout(function () {
          localStorage.setItem('language', lang);
          console.log("切換後語言：" + lang);
          applyLanguage(lang);
          $('#navbarNav').collapse('hide');
          
          // Ensure fade-in animations are re-triggered after language change if necessary
          // For simplicity, just re-trigger them. For complex sites, you might need more nuanced logic.
          $('.fade-in').removeClass('fade-in-triggered').css('opacity', 0); // Reset fade-in elements
          triggerFadeIn(); // Re-apply fade-in based on current scroll

          setTimeout(function () {
            $('#loading-overlay').fadeOut(300);
          }, 500); // Reduced delay
        }, 500); // Reduced delay
      });

            "product-item-desc-1": "クリエイターにコーヒーをご馳走しませんか(｡・ω・｡)", // Placeholder
            "product-item-button-1": "詳細を見る", // Placeholder

            "footer-link-contact-me": "お問い合わせ",
            "footer-link-other-platforms": "他のプラットフォーム",
            "footer-link-online-shop": "オンラインショップ",

            // Navbar
            "nav-home": "Home",
            // "nav-commission-wall": "Commission Status Wall", // If uncommented
            "nav-novels": "Novels",

        if (currentTranslations) {

          $('html').attr('lang', lang === 'zh' ? 'zh-Hant' : lang);
