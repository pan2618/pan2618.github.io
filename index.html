    <style>
        /* 淡入效果的 CSS */
        .fade-in-container {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* 確保淡入效果正常運作 */
        }
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out; /* 縮短動畫持續時間 */
            will-change: opacity, transform; /* 增加瀏覽器優化效果 */
        }
        .fade-in-triggered {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
        /* 等待動畫的 CSS */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f3f3f3;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: hidden;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

    <!-- 控制按鈕顯示/隱藏的 JavaScript -->
    <script>
        $(document).ready(function() {
            $('#navbarNav').on('show.bs.collapse', function () {
                $('#surveyBtn').hide();
            });

            $('#navbarNav').on('hidden.bs.collapse', function () {
                $('#surveyBtn').show();
            });

            // 檢測滑動並觸發淡入效果
            $(window).on('scroll', function() {
                $('.fade-in').each(function() {
                    var elementTop = $(this).offset().top;
                    var viewportBottom = $(window).scrollTop() + $(window).height();
                    if (elementTop < viewportBottom - 50) {
                        $(this).addClass('fade-in-triggered');
                    }
                });
            });

            // 初始檢查
            $(window).trigger('scroll');

            // 語言切換按鈕
            $('#language-switcher').click(function() {
                $('#loading').css('visibility', 'visible'); // 顯示等待動畫
                setTimeout(() => {
                    var currentLanguage = localStorage.getItem('language') || 'zh';
                    if (currentLanguage === 'zh') {
                        localStorage.setItem('language', 'jp');
                        $('#language-switcher').text('中文 / 日本語');
                        $('#hero-description').text('私のソーシャルアカウントをフォローしてください！');
                        $('nav a[href="about-site.html"]').text('私の作品');
                        $('nav a[href="about-us.html"]').text('シャトルコックについて');
                        $('h3.text-muted').text('特選作品');
                        $('h6.text-black-50').text('私が個人的に満足しているコレクションから作品を選んでください。');
                        $('h3.text-muted:contains("其他通路")').text('他のチャネル');
                        $('h5:contains("周邊商品")').text('周辺商品');
                        $('p:contains("描述輸入中")').text('説明入力中');
                        $('p:contains("描述")').text('説明');
                        $('a.footer-link:contains("商業合作")').text('商業協力');
                        $('a.footer-link:contains("與我聯絡")').text('お問い合わせ');
                        $('a.footer-link:contains("贊助開發者")').text('開発者を支援する');
                        $('a.footer-link:contains("線上商店")').text('オンラインショップ');
                    } else {
                        localStorage.setItem('language', 'zh');
                        $('#language-switcher').text('中文 / 日本語');
                        $('#hero-description').text('歡迎關注我的社群帳號！');
                        $('nav a[href="about-site.html"]').text('我的作品');
                        $('nav a[href="about-us.html"]').text('關於羽球');
                        $('h3.text-muted').text('精選作品');
                        $('h6.text-black-50').text('Select the works from the collection that I am personally satisfied with.');
                        $('h3.text-muted:contains("他のチャネル")').text('其他通路');
                        $('h5:contains("周辺商品")').text('周邊商品');
                        $('p:contains("説明入力中")').text('描述輸入中');
                        $('p:contains("説明")').text('描述');
                        $('a.footer-link:contains("商業協力")').text('商業合作');
                        $('a.footer-link:contains("お問い合わせ")').text('與我聯絡');
                        $('a.footer-link:contains("開発者を支援する")').text('贊助開發者');
                        $('a.footer-link:contains("オンラインショップ")').text('線上商店');
                    }

                    $('#navbarNav').collapse('hide'); // 點擊語言切換後收起導航欄
                    $('#loading').css('visibility', 'hidden'); // 隱藏等待動畫
                }, 1500);
            });

            // 根據本地存儲的語言狀態設置初始語言
            var savedLanguage = localStorage.getItem('language') || 'zh';
            if (savedLanguage === 'jp') {
                $('#language-switcher').click(); // 自動切換到日語
            }

            // 社群平台 Icon 單獨淡入效果
            $('.fade-in').each(function(index) {
                const $el = $(this);
                setTimeout(function() {
                    $el.addClass('fade-in-triggered');
                }, index * 320); // 每個元素延遲顯示為 100ms
            });
        });
    </script>
