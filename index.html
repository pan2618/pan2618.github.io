    <style>
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(34, 34, 34, 0.95); /* 半透明深色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* 確保在最上層 */
        }

        .loading {
            text-align: center;
        }

        .loading h2 {
            color: #ccc;
            margin: 0;
            font: 0.8em verdana;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .loading span {
            display: inline-block;
            vertical-align: middle;
            width: 0.6em;
            height: 0.6em;
            margin: 0.19em;
            background: #007DB6;
            border-radius: 0.6em;
            animation: loading 1s infinite alternate;
        }

        .loading span:nth-of-type(2) {
            background: #008FB2;
            animation-delay: 0.2s;
        }

        .loading span:nth-of-type(3) {
            background: #009B9E;
            animation-delay: 0.4s;
        }

        .loading span:nth-of-type(4) {
            background: #00A77D;
            animation-delay: 0.6s;
        }

        .loading span:nth-of-type(5) {
            background: #00B247;
            animation-delay: 0.8s;
        }

        .loading span:nth-of-type(6) {
            background: #5AB027;
            animation-delay: 1.0s;
        }

        .loading span:nth-of-type(7) {
            background: #A0B61E;
            animation-delay: 1.2s;
        }

        @keyframes loading {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.9s ease-out, transform 0.9s ease-out;
        }

        .fade-in-triggered {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
    </style>
</head>

      <!-- JS：自動滑動 + 左右切換功能 -->
      <script>
        const bannerContainer = document.getElementById('banner-container');
        const leftArrow = document.getElementById('arrow-left');
        const rightArrow = document.getElementById('arrow-right');
        const scrollStep = 500; 


        // 監聽左右按鈕點擊
        leftArrow.addEventListener('click', () => {
          bannerContainer.scrollBy({
            left: -scrollStep,
            behavior: 'smooth'
          });
        });
        rightArrow.addEventListener('click', () => {
          bannerContainer.scrollBy({
            left: scrollStep,
            behavior: 'smooth'
          });
        });
      
        // 自動滑動 (每隔 autoInterval 毫秒向右移動 scrollStep)
        let autoSlide = setInterval(() => {
          bannerContainer.scrollBy({
            left: scrollStep,
            behavior: 'smooth'
          });
        }, autoInterval);
      
        // 若使用者手動操作，則暫停自動滑動
        [bannerContainer, leftArrow, rightArrow].forEach(elem => {
          elem.addEventListener('click', () => {
            clearInterval(autoSlide);
          });
        });
      </script>

    <script>
        $(document).ready(function() {
            // 顯示 loading 畫面
            setTimeout(function() {
                $('#loading-overlay').fadeOut(300);
            }, 2500);
        });

        $(document).ready(function() {
            $('#navbarNav').on('show.bs.collapse', function () {
                $('#social-icons').hide(); // 當導航欄展開時隱藏社群 icon
            });

            $('#navbarNav').on('hidden.bs.collapse', function () {
                $('#social-icons').show(); // 當導航欄收起時顯示社群 icon
            });

            // 檢測滑動並觸發淡入效果
            $(window).on('scroll', function() {
                $('.fade-in').each(function() {
                    var elementTop = $(this).offset().top;
                    var viewportBottom = $(window).scrollTop() + $(window).height();
                    if (elementTop < viewportBottom - 50) {
                        $(this).addClass('fade-in-triggered');
                    }
                });
            });
            // 初始檢查
            $(window).trigger('scroll');

            // 語言切換按鈕
            $('#language-switcher').click(function() {
                // 顯示等待動畫
                $('#loading-overlay').css('visibility', 'visible').fadeIn(300);

                setTimeout(() => {
                    var currentLanguage = localStorage.getItem('language') || 'zh';
                    if (currentLanguage === 'zh') {
                        localStorage.setItem('language', 'jp');
                        $('#language-switcher').text('中文 / 日本語');
                        $('#hero-description').text('100枚のイラストを描くことに挑戦中');
                        $('nav a[href="about-work.html"]').text('私の作品');
                        // $('nav a[href="about-us.html"]').text('シャトルコックについて');
                        $('div.intro-text h3:contains("精選作品")').text('特選作品');
                        $('div.intro-text p:contains("Select the works")').text('私が個人的に満足しているコレクションから作品を選んでください。');
                        $('h3.text-muted:contains("其他通路")').text('他のチャネル');
                        $('h5:contains("周邊商品")').text('周辺商品');
                        $('p:contains("描述輸入中")').text('説明入力中');
                        $('p:contains("描述")').text('説明');
                        $('a.footer-link:contains("商業合作")').text('商業協力');
                        $('a.footer-link:contains("與我聯絡")').text('お問い合わせ');
                        $('a.footer-link:contains("贊助開發者")').text('開発者を支援する');
                        $('a.footer-link:contains("線上商店")').text('オンラインショップ');
                    } else {
                        localStorage.setItem('language', 'zh');
                        $('#language-switcher').text('中文 / 日本語');
                        $('#hero-description').text('歡迎關注我的社群帳號！');
                        $('nav a[href="about-site.html"]').text('我的作品');
                        $('nav a[href="about-us.html"]').text('關於羽球');
                        $('h3.text-muted').text('精選作品');
                        $('h6.text-black-50').text('Select the works from the collection that I am personally satisfied with.');
                        $('h3.text-muted:contains("他のチャネル")').text('其他通路');
                        $('h5:contains("周辺商品")').text('周邊商品');
                        $('p:contains("説明入力中")').text('描述輸入中');
                        $('p:contains("説明")').text('描述');
                        $('a.footer-link:contains("商業協力")').text('商業合作');
                        $('a.footer-link:contains("お問い合わせ")').text('與我聯絡');
                        $('a.footer-link:contains("開発者を支援する")').text('贊助開發者');
                        $('a.footer-link:contains("オンラインショップ")').text('線上商店');
                    }

                    $('#navbarNav').collapse('hide'); // 點擊語言切換後收起導航欄

                    setTimeout(() => {
                        $('#loading-overlay').fadeOut(300);
                    }, 1500);
                }, 1500);
            });

            // 根據本地存儲的語言狀態設置初始語言
            var savedLanguage = localStorage.getItem('language') || 'zh';
            if (savedLanguage === 'jp') {

                $('nav a[href="about-site.html"]').text('私の作品');
                $('nav a[href="about-us.html"]').text('シャトルコックについて');
                $('h3.text-muted').text('特選作品');
                $('h6.text-black-50').text('私が個人的に満足しているコレクションから作品を選んでください。');
                $('h3.text-muted:contains("其他通路")').text('他のチャネル');
                $('h5:contains("周邊商品")').text('周辺商品');
                $('p:contains("描述輸入中")').text('説明入力中');
                $('p:contains("描述")').text('説明');
                $('a.footer-link:contains("商業合作")').text('商業協力');

                $('a.footer-link:contains("贊助開發者")').text('開発者を支援する');
                $('a.footer-link:contains("線上商店")').text('オンラインショップ');
            }

            // 社群平台 Icon 單獨淡入效果
            $('.fade-in').each(function(index) {
                const $el = $(this);
                setTimeout(function() {
                    $el.addClass('fade-in-triggered');
                }, index * 600);
            });
        });
